services:
  postgres:
    image: postgres:16-alpine
    container_name: parkflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parkflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-parkflow}
      POSTGRES_DB: ${POSTGRES_DB:-parkflow_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
