# =============================================================================
# DEVELOPMENT PROFILE - H2 In-Memory Database
# No PostgreSQL required for local development
# =============================================================================

spring:
  datasource:
    url: jdbc:h2:mem:parkflow_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  # Disable Flyway for H2 (Hibernate will create schema)
  flyway:
    enabled: false

# Logging
logging:
  level:
    com.parkflow: DEBUG
    org.springframework.security: DEBUG
