spring:
  application:
    name: parkflow-api
  cache:
    type: caffeine
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
  flyway:
    enabled: false

app:
  rate-limit:
    enabled: false
  jwt:
    access-ttl-minutes: 15
    refresh-ttl-days: 7
    issuer: https://parkflow.local
    audience: parkflow-api
  cors:
    allowed-origins: http://localhost:6001,http://localhost:3000
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: '*'
    allow-credentials: true
  security:
    api-key: test-api-key-12345678901234567890
    jwt-secret: dGVzdC1qd3Qtc2VjcmV0LWJhc2U2NC1lbmNvZGVkLWF0LWxlYXN0LTMyLWJ5dGVzLWxvbmctdGV4dC1oZXJl
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 7
    jwt-clock-skew-seconds: 30
    offline-lease-hours: 48
    lockout-minutes: 30
    max-concurrent-sessions: 5
    seed-admin-email: admin@parkflow.local
    seed-admin-password: Qwert.12345
    swagger-public: false
    password-encoder-strength: 10
    cookie:
      secure: false
      same-site: Strict
    password:
      min-length: 8
      require-uppercase: true
      require-numbers: true
      require-special-chars: true
    common-passwords-file: classpath:common-passwords.txt
  uploads:
    dir: test-uploads
    base-url: /uploads
  cash:
    require-open-for-payment: false
    offline-close-allowed: true
    offline-max-manual-movement: 500000
    operations-hint: "Test cash mode"
    allow-multiple-open-sessions: true
    allow-multiple-sessions-per-user: false
    max-discrepancy-tolerance: 2000
    allow-manual-movements: true
    batch-audit-threshold: 100
    reconciliation-enabled: false

logging:
  level:
    com.parkflow: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG

parkflow:
  redis:
    enabled: false
