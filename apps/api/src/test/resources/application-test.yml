spring:
  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/parkflow_test
    username: parkflow
    password: parkflow_pwd
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL11Dialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    baseline-version: 001

app:
  security:
    offline-lease-hours: 48
    lockout-minutes: 30
    max-concurrent-sessions: 5
    jwt:
      access-ttl-minutes: 15
      refresh-ttl-days: 7

logging:
  level:
    com.parkflow: DEBUG
    org.springframework.web: DEBUG
