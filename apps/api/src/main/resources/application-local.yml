spring:
  datasource:
    url: jdbc:postgresql://localhost:${PARKFLOW_DB_PORT:6021}/parkflow_dev
    username: ${POSTGRES_USER:parkflow}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    out-of-order: true
    validate-on-migrate: false
