# =============================================================================
# PARKFLOW API CONFIGURATION
# =============================================================================

server:
  # Use PARKFLOW_API_PORT from environment (defaults to 6011 per convention)
  port: ${PARKFLOW_API_PORT:${PORT:6011}}

spring:
  application:
    name: parkflow-api
  datasource:
    # Use PARKFLOW_DB_PORT from environment (defaults to 6021 per convention)
    url: ${DATABASE_URL:jdbc:postgresql://localhost:${PARKFLOW_DB_PORT:6021}/parkflow_dev}
    username: ${POSTGRES_USER:parkflow}
    password: ${POSTGRES_PASSWORD:parkflow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  cash:
    require-open-for-payment: ${PARKFLOW_CASH_REQUIRE_OPEN:true}
    offline-close-allowed: ${PARKFLOW_CASH_OFFLINE_CLOSE:false}
    offline-max-manual-movement: ${PARKFLOW_CASH_OFFLINE_MAX_MANUAL:500000}
    operations-hint: ${PARKFLOW_CASH_OPS_HINT:Abra caja en el mismo terminal que el cobro; parametros por sede pueden relajar politicas.}
  cors:
    # CORS origins include both primary (6001) and fallback (6002) web ports
    # Also includes any port that might be used by Tauri dev server
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:6001,http://localhost:6002,http://127.0.0.1:6001,http://127.0.0.1:6002,http://localhost:3000,http://127.0.0.1:3000}
  security:
    # SECURITY: These secrets MUST be overridden in production via environment variables
    # The application will fail to start if they are not set in non-dev profiles
    api-key: ${PARKFLOW_API_KEY}
    jwt-secret: ${PARKFLOW_JWT_SECRET_BASE64}
    access-token-ttl-minutes: ${PARKFLOW_ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${PARKFLOW_REFRESH_TOKEN_TTL_DAYS:7}
    offline-lease-hours: ${PARKFLOW_OFFLINE_LEASE_HOURS:48}

parkflow:
  jwt:
    secret: ${PARKFLOW_JWT_SECRET_BASE64:tu_clave_secreta_en_base64_aqui}
