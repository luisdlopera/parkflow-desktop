server:
  port: ${PORT:8080}

spring:
  application:
    name: parkflow-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/parkflow_dev}
    username: ${POSTGRES_USER:parkflow}
    password: ${POSTGRES_PASSWORD:parkflow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  cash:
    require-open-for-payment: ${PARKFLOW_CASH_REQUIRE_OPEN:true}
    offline-close-allowed: ${PARKFLOW_CASH_OFFLINE_CLOSE:false}
    offline-max-manual-movement: ${PARKFLOW_CASH_OFFLINE_MAX_MANUAL:500000}
    operations-hint: ${PARKFLOW_CASH_OPS_HINT:Abra caja en el mismo terminal que el cobro; parametros por sede pueden relajar politicas.}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  security:
    # SECURITY: These secrets MUST be overridden in production via environment variables
    # The application will fail to start if they are not set in non-dev profiles
    api-key: ${PARKFLOW_API_KEY}
    jwt-secret: ${PARKFLOW_JWT_SECRET_BASE64}
    access-token-ttl-minutes: ${PARKFLOW_ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${PARKFLOW_REFRESH_TOKEN_TTL_DAYS:7}
    offline-lease-hours: ${PARKFLOW_OFFLINE_LEASE_HOURS:48}
