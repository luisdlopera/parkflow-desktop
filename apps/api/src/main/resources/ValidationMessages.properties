# =============================================================================
# ParkFlow — Bean Validation messages in Spanish
# Overrides all default Hibernate Validator English messages.
# Keys match the constraint annotation class name in the format:
#   jakarta.validation.constraints.<ConstraintName>.message
# =============================================================================

# Null / blank / empty
jakarta.validation.constraints.NotNull.message=Este campo es obligatorio
jakarta.validation.constraints.NotBlank.message=Este campo no puede estar vacío
jakarta.validation.constraints.NotEmpty.message=Este campo no puede estar vacío
jakarta.validation.constraints.Null.message=Este campo debe estar vacío

# Boolean
jakarta.validation.constraints.AssertTrue.message=Este campo debe ser verdadero
jakarta.validation.constraints.AssertFalse.message=Este campo debe ser falso

# Numeric ranges
jakarta.validation.constraints.Positive.message=El valor debe ser mayor a cero
jakarta.validation.constraints.PositiveOrZero.message=El valor no puede ser negativo
jakarta.validation.constraints.Negative.message=El valor debe ser menor a cero
jakarta.validation.constraints.NegativeOrZero.message=El valor no puede ser positivo
jakarta.validation.constraints.Min.message=El valor mínimo permitido es {value}
jakarta.validation.constraints.Max.message=El valor máximo permitido es {value}
jakarta.validation.constraints.DecimalMin.message=El valor mínimo permitido es {value}
jakarta.validation.constraints.DecimalMax.message=El valor máximo permitido es {value}
jakarta.validation.constraints.Digits.message=El número no tiene el formato correcto (máx. {integer} enteros y {fraction} decimales)

# Size / length
jakarta.validation.constraints.Size.message=La longitud debe estar entre {min} y {max} caracteres

# Pattern / format
jakarta.validation.constraints.Pattern.message=El formato del campo no es válido
jakarta.validation.constraints.Email.message=El correo electrónico no tiene un formato válido

# Date / time
jakarta.validation.constraints.Past.message=La fecha debe ser en el pasado
jakarta.validation.constraints.PastOrPresent.message=La fecha debe ser en el pasado o en la fecha actual
jakarta.validation.constraints.Future.message=La fecha debe ser en el futuro
jakarta.validation.constraints.FutureOrPresent.message=La fecha debe ser en el futuro o en la fecha actual

# Hibernate Validator extras (commonly used)
org.hibernate.validator.constraints.Length.message=La longitud debe estar entre {min} y {max} caracteres
org.hibernate.validator.constraints.NotBlank.message=Este campo no puede estar vacío
org.hibernate.validator.constraints.NotEmpty.message=Este campo no puede estar vacío
org.hibernate.validator.constraints.Range.message=El valor debe estar entre {min} y {max}
org.hibernate.validator.constraints.URL.message=La URL no tiene un formato válido
org.hibernate.validator.constraints.UUID.message=El campo debe ser un UUID válido
org.hibernate.validator.constraints.CreditCardNumber.message=El número de tarjeta no es válido
