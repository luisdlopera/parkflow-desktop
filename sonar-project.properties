# =====================================================
# SonarCloud Configuration for Parkflow Desktop
# =====================================================
# Repository: https://github.com/luisdlopera/parkflow-desktop
# 
# Setup Instructions:
# 1. Go to https://sonarcloud.io and log in with GitHub
# 2. Click "+" → "Analyze new project" → Select this repo
# 3. In project settings, generate a token
# 4. Add the token as SONAR_TOKEN in GitHub repo secrets
# =====================================================

# Organization and Project
sonar.organization=luisdlopera
sonar.projectKey=luisdlopera_parkflow-desktop
sonar.projectName=Parkflow Desktop
sonar.projectVersion=0.1.0

# Source Code Directories
sonar.sources=\
  apps/web/src,\
  apps/desktop/src,\
  apps/print-agent/src,\
  apps/api/src/main,\
  packages/types/src,\
  packages/print-core/src

# Test Directories
sonar.tests=\
  apps/web/src,\
  apps/api/src/test

# File Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/.next/**,\
  **/out/**,\
  **/coverage/**,\
  **/*.config.*,\
  **/target/**,\
  **/*.d.ts,\
  **/mocks/**,\
  **/*.test.{ts,tsx},\
  **/*.spec.{ts,tsx}

# =====================================================
# TypeScript / JavaScript Configuration
# =====================================================
sonar.typescript.tsconfigPaths=\
  apps/web/tsconfig.json,\
  apps/desktop/tsconfig.json,\
  apps/print-agent/tsconfig.json

# Coverage Reports (LCOV format from Vitest)
sonar.javascript.lcov.reportPaths=apps/web/coverage/lcov.info

# =====================================================
# Java Configuration
# =====================================================
# Compiled classes directories
sonar.java.binaries=apps/api/build/classes/java/main
sonar.java.test.binaries=apps/api/build/classes/java/test

# JaCoCo Coverage Report
sonar.coverage.jacoco.xmlReportPaths=apps/api/build/reports/jacoco/test/jacocoTestReport.xml

# =====================================================
# SCM Configuration
# =====================================================
sonar.scm.provider=git

# =====================================================
# Analysis Properties
# =====================================================
# Quality Gate wait (optional - uncomment if you want CI to fail on Quality Gate)
# sonar.qualitygate.wait=true
