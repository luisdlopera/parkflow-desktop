name: Release - Desktop

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact-name: Parkflow_Desktop_macOS.dmg
          - os: windows-latest
            artifact-name: Parkflow_Desktop_x64.msi

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (Next.js export)
        run: pnpm build:web

      - name: Build Tauri app
        run: pnpm build:desktop

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          retention-days: 90

  create-release:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -laR artifacts/

      - name: Generate release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## ParkFlow Desktop ${{ github.ref_name }}

          ### Instalación
          - **macOS**: `Parkflow_Desktop_macOS.dmg`
          - **Windows**: `Parkflow_Desktop_x64.msi`

          > ⚠️ Los instaladores no están firmados. Al instalar:
          > - **macOS**: Clic derecho → Abrir, luego aceptar en Seguridad
          > - **Windows**: Clic en "Ejecutar de todas formas"
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ParkFlow Desktop ${{ github.ref_name }}
          body_path: release-notes.md
          draft: true
          prerelease: false
          files: |
            artifacts/*.dmg
            artifacts/*.msi
