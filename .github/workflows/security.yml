name: Security DAST & Compliance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    # Nightly full DAST at 03:00 UTC
    - cron: '0 3 * * *'

permissions:
  contents: read
  security-events: write
  issues: write
  actions: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: false

env:
  ZAP_VERSION: stable
  FAIL_ON_HIGH: true
  FAIL_ON_MEDIUM: false

jobs:
  # =============================================================================
  # SAST (Semgrep) — Fast static analysis
  # =============================================================================
  sast_semgrep:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --sarif --output=semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  # =============================================================================
  # Dependency Scanning (OWASP Dependency-Check)
  # =============================================================================
  dependency_check:
    name: Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'parkflow-monorepo'
          path: '.'
          format: 'ALL'
          args: >
            --enableRetired
            --enableExperimental
      - name: Upload dependency-check report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 14

  # =============================================================================
  # Secret Scanning (GitLeaks)
  # =============================================================================
  secret_scan:
    name: Secret Scanning (GitLeaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # =============================================================================
  # DAST — ZAP Baseline Scan (Web Frontend)
  # =============================================================================
  zap_baseline:
    name: DAST — ZAP Baseline (Web)
    runs-on: ubuntu-latest
    needs: []
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: parkflow
          POSTGRES_PASSWORD: parkflow
          POSTGRES_DB: parkflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U parkflow -d parkflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://parkflow:parkflow@localhost:5432/parkflow_test
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web application
        run: pnpm build:web

      - name: Start web application (background)
        run: |
          pnpm --filter @parkflow/web start &
          echo $! > /tmp/nextjs.pid

      - name: Wait for application readiness
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 >/dev/null 2>&1; then
              echo "Application ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Application failed to start"
          exit 1

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://localhost:3000'
          rules_file_name: 'security/zap/baseline.conf'
          cmd_options: >
            -a
            -j
            --auto
          allow_issue_writing: true
          issue_title: 'ZAP Baseline Scan — Security Alerts'

      - name: Upload ZAP reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-baseline-reports
          path: |
            report_*.html
            report_*.xml
            report_*.json
          retention-days: 14

      - name: Fail on High severity vulnerabilities
        if: env.FAIL_ON_HIGH == 'true'
        run: |
          if [ -f report_json.json ]; then
            HIGH_COUNT=$(jq '[.site[0].alerts[] | select(.riskcode == "3")] | length' report_json.json || echo 0)
            if [ "$HIGH_COUNT" -gt 0 ]; then
              echo "❌ Found $HIGH_COUNT HIGH severity vulnerabilities"
              exit 1
            fi
          fi

      - name: Stop application
        if: always()
        run: |
          if [ -f /tmp/nextjs.pid ]; then
            kill $(cat /tmp/nextjs.pid) || true
          fi

  # =============================================================================
  # DAST — ZAP API Scan (Backend API)
  # =============================================================================
  zap_api_scan:
    name: DAST — ZAP API Scan
    runs-on: ubuntu-latest
    needs: [dependency_check]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: parkflow
          POSTGRES_PASSWORD: parkflow
          POSTGRES_DB: parkflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U parkflow -d parkflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SPRING_PROFILES_ACTIVE: ci
      DB_URL: jdbc:postgresql://localhost:5432/parkflow_test
      DB_USERNAME: parkflow
      DB_PASSWORD: parkflow
      PARKFLOW_API_KEY: ${{ secrets.PARKFLOW_API_KEY }}
      PARKFLOW_JWT_SECRET_BASE64: ${{ secrets.PARKFLOW_JWT_SECRET_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.8

      - name: Verify secrets and generate JWT secret if missing
        run: |
          echo "=== Secret Verification ==="
          if [ -n "$PARKFLOW_API_KEY" ]; then echo "✓ PARKFLOW_API_KEY is set"; else echo "✗ PARKFLOW_API_KEY is missing"; fi
          if [ -n "$PARKFLOW_JWT_SECRET_BASE64" ]; then 
            echo "✓ PARKFLOW_JWT_SECRET_BASE64 is set" 
          else 
            echo "⚠ PARKFLOW_JWT_SECRET_BASE64 is empty — generating secure fallback"
            export PARKFLOW_JWT_SECRET_BASE64=$(openssl rand -base64 32)
            echo "PARKFLOW_JWT_SECRET_BASE64=$PARKFLOW_JWT_SECRET_BASE64" >> $GITHUB_ENV
          fi

      - name: Build API
        run: ./apps/api/gradlew -p apps/api build -x test

      - name: Start API (background)
        run: |
          nohup ./apps/api/gradlew -p apps/api bootRun > /tmp/api.log 2>&1 &

      - name: Wait for API health
        run: |
          for i in {1..120}; do
            if curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null; then
              echo "API ready after $((i * 2))s"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start"
          cat /tmp/api.log
          exit 1

      - name: Seed CI database
        run: |
          PGPASSWORD=parkflow psql -h localhost -U parkflow -d parkflow_test -f .github/scripts/seed-ci-data.sql

      - name: Fetch OpenAPI spec
        run: |
          curl -fsS http://127.0.0.1:8080/api/v1/api-docs -o /tmp/openapi.json

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.8.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: 'http://127.0.0.1:8080'
          rules_file_name: 'security/zap/api-scan.conf'
          format: 'openapi'
          cmd_options: >
            -f openapi
            -z "-config replacer.full_list(0).description=auth"
            -z "-config replacer.full_list(0).enabled=true"
            -z "-config replacer.full_list(0).matchtype=REQ_HEADER"
            -z "-config replacer.full_list(0).matchstr=Authorization"
            -z "-config replacer.full_list(0).regex=false"
            -z "-config replacer.full_list(0).replacement=Bearer ${{ secrets.PARKFLOW_API_KEY }}"
          allow_issue_writing: true
          issue_title: 'ZAP API Scan — Security Alerts'

      - name: Upload ZAP API reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-api-reports
          path: |
            report_*.html
            report_*.xml
            report_*.json
          retention-days: 14

      - name: Fail on High severity vulnerabilities
        if: env.FAIL_ON_HIGH == 'true'
        run: |
          if [ -f report_json.json ]; then
            HIGH_COUNT=$(jq '[.site[0].alerts[] | select(.riskcode == "3")] | length' report_json.json || echo 0)
            if [ "$HIGH_COUNT" -gt 0 ]; then
              echo "❌ Found $HIGH_COUNT HIGH severity API vulnerabilities"
              exit 1
            fi
          fi

      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-log-security
          path: /tmp/api.log

  # =============================================================================
  # Report Aggregation
  # =============================================================================
  security_report:
    name: Security Report Aggregation
    runs-on: ubuntu-latest
    needs: [zap_baseline, zap_api_scan, dependency_check, secret_scan]
    if: always()
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: security/reports/
          merge-multiple: false

      - name: Generate security summary
        run: |
          echo "# Security Scan Results" > security/reports/SUMMARY.md
          echo "| Scan | Status |" >> security/reports/SUMMARY.md
          echo "|------|--------|" >> security/reports/SUMMARY.md
          echo "| ZAP Baseline | ${{ needs.zap_baseline.result }} |" >> security/reports/SUMMARY.md
          echo "| ZAP API Scan | ${{ needs.zap_api_scan.result }} |" >> security/reports/SUMMARY.md
          echo "| Dependency Check | ${{ needs.dependency_check.result }} |" >> security/reports/SUMMARY.md
          echo "| Secret Scan | ${{ needs.secret_scan.result }} |" >> security/reports/SUMMARY.md

      - name: Upload aggregated report
        uses: actions/upload-artifact@v4
        with:
          name: security-aggregate-report
          path: security/reports/
          retention-days: 30
