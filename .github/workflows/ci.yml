name: ParkFlow CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_typecheck:
    name: Lint + Typecheck + Tests (Web)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @parkflow/web lint
      - run: pnpm --filter @parkflow/web typecheck
      - run: pnpm --filter @parkflow/web test
      - run: pnpm --filter @parkflow/web test:coverage

  unit_tests:
    name: Unit tests (API)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/actions/setup-gradle@9e8a83d72611e9dc85ee9ee0a1f94d93ee4f4a31 # v4
        with:
          gradle-version: 8.8
      - name: Run API tests
        run: gradle -p apps/api check
      - name: Upload JaCoCo coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: jacoco-report
          path: apps/api/build/reports/jacoco/
          retention-days: 14

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [lint_typecheck, unit_tests]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  integration_regression:
    name: Integration + regression checks
    runs-on: ubuntu-latest
    needs: [lint_typecheck, unit_tests]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/actions/setup-gradle@9e8a83d72611e9dc85ee9ee0a1f94d93ee4f4a31 # v4
        with:
          gradle-version: 8.8
      - name: Run full API build
        run: ./apps/api/gradlew -p apps/api build

  desktop_tests:
    name: Desktop tests (Rust + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev pkg-config
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @parkflow/desktop test:unit
      - run: pnpm --filter @parkflow/desktop test:integration

  desktop_e2e:
    name: Desktop E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [desktop_tests]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - run: pnpm --filter @parkflow/desktop test:e2e

  e2e_cross_browser:
    name: E2E cross-browser (Playwright)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers (all)
        run: pnpm exec playwright install --with-deps firefox webkit chromium
      - name: Run full cross-browser E2E suite
        run: pnpm exec playwright test --config qa/e2e/playwright.config.ts

  e2e_critical:
    name: E2E critical flows (API)
    runs-on: ubuntu-latest
    needs: [lint_typecheck, unit_tests]
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16@sha256:fe03a7605299a34ddf5e4f285dff78c3d7190a576b3c6b46f2fcff69f4bffd54
        env:
          POSTGRES_USER: parkflow
          POSTGRES_PASSWORD: parkflow
          POSTGRES_DB: parkflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U parkflow -d parkflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7@sha256:b2b95679e3b46fb51864949ed25ea976fc3a6bcc00a40a1bc00d568cb2822e50
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      SPRING_PROFILES_ACTIVE: dev
      PARKFLOW_API_PORT: 8080
      DB_URL: jdbc:postgresql://localhost:5432/parkflow
      DB_USERNAME: parkflow
      DB_PASSWORD: parkflow
      PARKFLOW_API_KEY: ${{ secrets.PARKFLOW_API_KEY }}
      PARKFLOW_JWT_SECRET_BASE64: ${{ secrets.PARKFLOW_JWT_SECRET_BASE64 || 'cGFya2Zsb3ctZGVmYXVsdC1iYXNlNjQtand0LXNlY3JldC1rZXktZm9yLWRldmVsb3BtZW50' }}
      PARKFLOW_SEED_ADMIN_PASSWORD: ${{ secrets.PARKFLOW_SEED_ADMIN_PASSWORD }}
      PARKFLOW_SEED_CASHIER_PASSWORD: ${{ secrets.PARKFLOW_SEED_CASHIER_PASSWORD }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/actions/setup-gradle@9e8a83d72611e9dc85ee9ee0a1f94d93ee4f4a31 # v4
        with:
          gradle-version: 8.8
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Build API (skip tests)
        run: ./apps/api/gradlew -p apps/api build -x test
      - name: Start API
        run: |
          nohup ./apps/api/gradlew -p apps/api bootRun > /tmp/api.log 2>&1 &
      - name: Wait for health
        run: |
          for i in {1..180}; do
            if curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null; then
              echo "API is healthy after $((i * 2)) seconds"
              exit 0
            fi
            sleep 2
          done
          echo "API failed to start within 6 minutes"
          cat /tmp/api.log
          exit 1
      - name: Seed CI database
        env:
          PGPASSWORD: ${{ env.DB_PASSWORD }}
        run: |
          psql -h localhost -U parkflow -d parkflow -f .github/scripts/seed-ci-data.sql
      - name: Run critical E2E suite
        run: bash qa/operations-e2e/curl/run-critical-e2e.sh
      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: api-log
          path: /tmp/api.log
