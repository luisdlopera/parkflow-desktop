name: Parkflow CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
  workflow_dispatch:
  schedule:
    # Daily at 02:00 UTC for full background validation
    - cron: "0 2 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_typecheck:
    name: Lint + Typecheck (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @parkflow/web lint
      - run: pnpm --filter @parkflow/web test

  unit_tests:
    name: Unit tests (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.8
      - name: Run API unit tests
        run: gradle -p apps/api test

  integration_regression:
    name: Integration + regression checks
    runs-on: ubuntu-latest
    needs: [lint_typecheck, unit_tests]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.8
      - name: Run full API build (includes tests and packaging)
        run: gradle -p apps/api build

  desktop:
    name: Desktop (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
        working-directory: apps/desktop/src-tauri
