name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  web:
    name: Web (lint/build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @parkflow/web lint
      - run: pnpm --filter @parkflow/web build

  api:
    name: API (test/build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.8
      - run: gradle -p apps/api build

  desktop:
    name: Desktop (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
        working-directory: apps/desktop/src-tauri
