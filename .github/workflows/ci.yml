name: Parkflow CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
  workflow_dispatch:
  schedule:
    # Daily at 02:00 UTC for full background validation
    - cron: "0 2 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_typecheck:
    name: Lint + Typecheck (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @parkflow/web lint
      - run: pnpm --filter @parkflow/web test
      - run: pnpm --filter @parkflow/web test:coverage

  unit_tests:
    name: Unit tests (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.8
      - name: Run API unit tests + coverage verification
        run: gradle -p apps/api check

  integration_regression:
    name: Integration + regression checks
    runs-on: ubuntu-latest
    needs: [lint_typecheck, unit_tests]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.8
      - name: Run full API build (includes tests and packaging)
        run: gradle -p apps/api build

  desktop_tests:
    name: Desktop tests (Rust + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @parkflow/desktop test:unit
      - run: pnpm --filter @parkflow/desktop test:integration

  desktop_e2e:
    name: Desktop E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [desktop_tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - run: pnpm --filter @parkflow/desktop test:e2e

  e2e_cross_browser:
    name: E2E cross-browser (Playwright)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers (all)
        run: pnpm exec playwright install --with-deps firefox webkit chromium
      - name: Run full cross-browser E2E suite
        run: pnpm exec playwright test --config qa/e2e/playwright.config.ts

  e2e-critical:
    name: E2E critical flows (API)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: parkflow
          POSTGRES_PASSWORD: parkflow
          POSTGRES_DB: parkflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U parkflow -d parkflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://localhost:5432/parkflow
      DB_USERNAME: parkflow
      DB_PASSWORD: parkflow
      PARKFLOW_API_KEY: ${{ secrets.PARKFLOW_API_KEY }}
      PARKFLOW_JWT_SECRET_BASE64: ${{ secrets.PARKFLOW_JWT_SECRET_BASE64 }}
      PARKFLOW_SEED_ADMIN_PASSWORD: ${{ secrets.PARKFLOW_SEED_ADMIN_PASSWORD }}
      PARKFLOW_SEED_CASHIER_PASSWORD: ${{ secrets.PARKFLOW_SEED_CASHIER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Start API
        run: |
          nohup ./apps/api/gradlew -p apps/api bootRun > /tmp/api.log 2>&1 &
      - name: Wait for health
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/api.log
          exit 1
      - name: Run critical E2E suite
        run: qa/operations-e2e/curl/run-critical-e2e.sh
      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-log
          path: /tmp/api.log
