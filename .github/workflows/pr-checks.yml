name: PR Quality Checks

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

jobs:
  pr-lint:
    name:
    permissions:
      contents: read PR Title Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            perf
            test
            docs
            chore
            style
            ci
            security
            revert
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" must start with an uppercase letter.
          wip: false
          validateSingleCommit: false

  pr-size:
    name:
    permissions:
      contents: read
      pull-requests: write PR Size Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  pr-body:
    name:
    permissions:
      contents: read
      pull-requests: write PR Body Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const required = [
              { field: 'Summary', pattern: /## Summary/i },
              { field: 'Type of Change', pattern: /## Type of Change/i },
              { field: 'Technical Checklist', pattern: /## Technical Checklist/i },
              { field: 'Test Plan', pattern: /## Test Plan/i },
            ];
            const missing = required.filter(r => !r.pattern.test(body));
            if (missing.length > 0) {
              core.setFailed(
                `PR template incomplete. Missing sections: ${missing.map(m => m.field).join(', ')}`
              );
            }

  todo-check:
    name:
    permissions:
      contents: read TODO/FIXME Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Check for TODOs in changed files
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const todoFiles = [];
            for (const file of files) {
              if (file.status === 'removed') continue;
              const { data: contents } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: file.filename,
                ref: pr.head.sha,
              });
              const content = Buffer.from(contents.content, 'base64').toString();
              if (/TODO|FIXME|HACK|XXX|console\.log/.test(content)) {
                todoFiles.push(file.filename);
              }
            }
            if (todoFiles.length > 0) {
              core.setFailed(
                `Found TODOs/FIXMEs/console.log in: ${todoFiles.join(', ')}`
              );
            }

  pr-summary:
    name:
    permissions:
      contents: read
      issues: write
      pull-requests: write PR Summary
    runs-on: ubuntu-latest
    needs: [pr-lint, pr-body, todo-check]
    if: always() && github.event_name == 'pull_request_target'
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const checks = {
              'PR Title': '${{ needs.pr-lint.result }}',
              'PR Body': '${{ needs.pr-body.result }}',
              'TODOs Check': '${{ needs.todo-check.result }}',
            };
            const status = (s) => s === 'success' ? '✅ Pass' : s === 'skipped' ? '⏭️ Skipped' : '❌ Fail';
            const summary = Object.entries(checks)
              .map(([k, v]) => `| ${k} | ${status(v)} |`)
              .join('\n');
            const comment = `### PR Quality Checks\n\n| Check | Status |\n|-------|--------|\n${summary}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body?.includes('PR Quality Checks')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment,
              });
            }
