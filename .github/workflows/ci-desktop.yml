name: CI - Desktop

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/desktop/**"
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-desktop.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-desktop.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml -- -D warnings

  test-rust:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --lib
      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
          --test licensing_persistence --test local_first_tests

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (Next.js export)
        run: pnpm build:web

      - name: Build Tauri app
        run: pnpm build:desktop

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: parkflow-desktop-${{ matrix.os }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/
          retention-days: 7
