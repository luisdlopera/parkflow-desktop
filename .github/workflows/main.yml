name: Main Branch Pipeline

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  actions: write
  checks: write

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Full Validation
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [sonarcloud]
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: qualityGate } = await github.request(
              'GET /sonarcloud/api/qualitygates/project_status',
              {
                params: {
                  projectKey: 'luisdlopera_parkflow-desktop'
                }
              }
            );
            if (qualityGate.projectStatus.status !== 'OK') {
              core.setFailed(`SonarCloud quality gate failed: ${qualityGate.projectStatus.status}`);
            }

  build-artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: [sonarcloud]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: pnpm install --frozen-lockfile
      - name: Build API
        run: ./apps/api/gradlew -p apps/api build
      - name: Build Web
        run: pnpm build:web
      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-jar
          path: apps/api/build/libs/*.jar
          retention-days: 7
      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/out/
          retention-days: 7
      - name: Create Git tag
        run: |
          VERSION=$(node -p "require('./package.json').version || '0.1.0'")
          DATE_TAG="v${VERSION}-$(date +%Y%m%d%H%M%S)"
          echo "VERSION_TAG=${DATE_TAG}" >> $GITHUB_ENV

  deploy-ready:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [build-artifacts, quality-gate]
    steps:
      - name: Check all jobs passed
        run: |
          echo "All validation and build jobs completed successfully"
          echo "Repository is ready for deployment"
