name: Main Branch Pipeline

on:
  push:
    branches: ["main"]

concurrency:
  group: main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name:
    permissions:
      contents: read
      actions: write
      checks: write Full Validation
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  sonarcloud:
    name:
    permissions:
      contents: read SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [sonarcloud]
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data: qualityGate } = await github.request(
              'GET /sonarcloud/api/qualitygates/project_status',
              {
                params: {
                  projectKey: 'luisdlopera_parkflow-desktop'
                }
              }
            );
            if (qualityGate.projectStatus.status !== 'OK') {
              core.setFailed(`SonarCloud quality gate failed: ${qualityGate.projectStatus.status}`);
            }

  build-artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: [sonarcloud]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - run: pnpm install --frozen-lockfile
      - name: Build API
        run: ./apps/api/gradlew -p apps/api build
      - name: Build Web
        run: pnpm build:web
      - name: Upload API artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: api-jar
          path: apps/api/build/libs/*.jar
          retention-days: 7
      - name: Upload Web artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-build
          path: apps/web/out/
          retention-days: 7
      - name: Create Git tag
        run: |
          VERSION=$(node -p "require('./package.json').version || '0.1.0'")
          DATE_TAG="v${VERSION}-$(date +%Y%m%d%H%M%S)"
          echo "VERSION_TAG=${DATE_TAG}" >> $GITHUB_ENV

  deploy-ready:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    needs: [build-artifacts, quality-gate]
    steps:
      - name: Check all jobs passed
        run: |
          echo "All validation and build jobs completed successfully"
          echo "Repository is ready for deployment"
